name: Daily Data Refresh

on:
  schedule:
    - cron: '0 8 * * *'  # 8am UTC daily (3am ET)
  workflow_dispatch:  # manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests rich

      - name: Build site
        run: python src/build_site.py --no-deploy --refresh-data

      - name: Create PR with changes
        run: |
          git config user.name "HD Research Bot"
          git config user.email "bot@hdresearchhub.dev"
          git add data/data.json index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          BRANCH="auto/data-refresh-$(date '+%Y%m%d')"
          git checkout -b "$BRANCH"
          git commit -m "Auto-update: $(date '+%Y-%m-%d') data refresh"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Daily data refresh $(date '+%Y-%m-%d')" \
            --body "Auto-generated by GitHub Actions. Fresh data from PubMed, ClinicalTrials.gov, HDBuzz." \
            --base main
          gh pr merge --merge --admin
        env:
          GH_TOKEN: ${{ github.token }}
